<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sticky Example</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .header {
            position: sticky;
            top: 0;

            background: orange;
            padding: 20px;
        }

        .content {
            height: 2000px;
            padding: 20px;
        }

        .intro-section {
            height: 300px;
            background: lightblue;
        }
    </style>
</head>
<body>
      <div style="height:3000px; background: lightblue;">
        Scroll until the orange bar reaches the top.
    </div>

    <div class="header">
        I am a the header! of the page. I will stick to the top of the page when you reach my scroll position.
    </div>

    <div class="content">
        Keep scrolling to see the effect...
    </div>

    </div>
    
</body>
</html>
