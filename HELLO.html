<!DOCTYPE html>
<html lang="en">
<head>


<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Bootstrap CSS -->

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />

<!-- My CSS -->

<link rel="stylesheet" href="stylesheet2.css" />

<!-- Font Awesome -->

<script src="https://kit.fontawesome.com/996973c893.js"></script>

<!-- Google Fonts -->

<link href="https://fonts.googleapis.com/css2?family=Barlow+TT:ital,wght@0,400;0,700;0,800;0,900;1,400&display=swap"

rel="stylesheet" />

<title>Hotel Polo Towers</title>

<style>
  /* Google Font */
body{
    margin:0;
    font-family:'Barlow TT',sans-serif;
    background:#f8f9fa;
}

/* Social Section */

#social{
    background:linear-gradient(135deg,#1d3557,#457b9d);
    padding:90px 20px;
    text-align:center;
}

#social h4{
    color:#ffc107;
    font-weight:bold;
    letter-spacing:2px;
}

#social h1{
    color:#fff;
    font-weight:800;
    margin-top:15px;
}

#social p{
    color:#ddd;
    margin-top:20px;
    font-size:18px;
}

/* Icons */

.social-icons{
    margin-top:40px;
}

.social-icons a{
    display:inline-flex;
    justify-content:center;
    align-items:center;

    width:70px;
    height:70px;

    margin:10px;

    background:white;
    color:#1d3557;

    border-radius:50%;
    text-decoration:none;

    font-size:28px;

    transition:.4s;
}

.social-icons a:hover{
    background:#ffc107;
    color:white;
    transform:translateY(-8px) scale(1.1);
    box-shadow:0 10px 10px 


}
</style>
</head>
<body>

    <!-- Social Media Section -->
    <section id="social" class="text-center">
        <div class="container">
            <h4 class="text-warning">Hotel Polo Towers</h4>
            <h1 class="display-4 text-white">Connect With Us</h1>
            <p class="text-light">
                Follow us on social media for exciting offers and updates.
            </p>

            <div class="social-icons mt-4">
                <a href="https://www.linkedin.com" target="_blank">
                    <i class="fab fa-linkedin-in"></i>
                </a>

                <a href="https://www.youtube.com" target="_blank">
                    <i class="fab fa-youtube"></i>
                </a>

                <a href="mailto:info@hotelpolotowers.com">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="footer">
        <div class="container text-center">
            <h3>Hotel Polo Towers</h3>

            <p>
                Luxury • Comfort • Hospitality
            </p>

            <hr>

            <p>
                © 2026 Hotel Polo Towers. All Rights Reserved.
            </p>
        </div>
    </footer>

</body>
